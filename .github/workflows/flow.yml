on: 
  push:
  pull_request:
  workflow_dispatch: 

name: Continuous integration

jobs:
  # --- Linux 构建任务 ---
  build-latest-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]
        lua: [lua53, lua54, lua55]
        include:
          - os-prefix: linux
            ext: so
    steps:
      - uses: actions/checkout@master
      - uses: hecrj/setup-rust-action@v2
        with:
          rust-version: ${{ matrix.rust }}

      - name: Setup Lua Environment
        run: |
          sudo apt-get update
          if [[ "${{ matrix.lua }}" == "lua55" ]]; then
            curl -L https://www.lua.org/ftp/lua-5.5.0.tar.gz | tar xz
            cd lua-5.5.0
            make linux MYCFLAGS="-fPIC"
            sudo make install
            echo "LUA_LIB_DIR=/usr/local/lib" >> $GITHUB_ENV
            echo "LUA_INCLUDE_DIR=/usr/local/include" >> $GITHUB_ENV
            sudo ldconfig /usr/local/lib
          else
            LUA_VER="${{ matrix.lua == 'lua53' && '5.3' || '5.4' }}"
            sudo apt-get install -y --no-install-recommends liblua${LUA_VER}-dev
          fi

      - name: Build ${{ matrix.lua }} target
        run: cargo build --release --features "${{ matrix.lua }}"
        env:
          LUA_LIB_DIR: ${{ env.LUA_LIB_DIR }}
          LUA_INCLUDE_DIR: ${{ env.LUA_INCLUDE_DIR }}

      - name: Rename and Upload
        run: |
          mv target/release/libwordninja_rs_lua.${{ matrix.ext }} wordninja_${{ matrix.os-prefix }}_${{ matrix.lua }}.so
      - uses: actions/upload-artifact@v4
        with:
          name: wordninja-${{ matrix.os-prefix }}-${{ matrix.lua }}
          path: wordninja_${{ matrix.os-prefix }}_${{ matrix.lua }}.so

  # --- Windows 32位 构建任务 ---
  build-latest-win32:
    runs-on: windows-latest
    strategy:
      matrix:
        rust: [stable]
        lua: [lua53, lua54, lua55]
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true # 修复 Windows 下的 SSL 证书报错
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32 # 指定 32 位环境
      - uses: actions/checkout@master
      - name: Install Rust and Lua (32-bit)
        run: |
          pacman -S --noconfirm mingw-w64-i686-rust mingw-w64-i686-lua mingw-w64-i686-lua53 mingw-w64-i686-pkg-config
      - name: Build windows 32
        run: cargo build --release --features ${{ matrix.lua }}
      - name: Rename and Upload
        run: mv target/release/wordninja_rs_lua.dll wordninja_windows_32_${{ matrix.lua }}.dll
      - uses: actions/upload-artifact@v4
        with:
          name: wordninja-windows-32-${{ matrix.lua }}
          path: wordninja_windows_32_${{ matrix.lua }}.dll

  # --- Windows 64位 构建任务 ---
  build-latest-win64:
    runs-on: windows-latest
    strategy:
      matrix:
        rust: [stable]
        lua: [lua53, lua54, lua55]
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true # 修复 SSL 报错
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64 # 指定 64 位环境
      - uses: actions/checkout@master
      - name: Install Rust and Lua (64-bit)
        run: |
          pacman -S --noconfirm mingw-w64-x86_64-rust mingw-w64-x86_64-lua mingw-w64-x86_64-lua53 mingw-w64-x86_64-pkg-config
      - name: Build windows 64
        run: cargo build --release --features ${{ matrix.lua }}
      - name: Rename and Upload
        run: mv target/release/wordninja_rs_lua.dll wordninja_windows_64_${{ matrix.lua }}.dll
      - uses: actions/upload-artifact@v4
        with:
          name: wordninja-windows-64-${{ matrix.lua }}
          path: wordninja_windows_64_${{ matrix.lua }}.dll

  # --- 发布任务 ---
  release-latest:
    needs: [build-latest-linux, build-latest-win32, build-latest-win64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          files: |
            wordninja-windows-32-lua*
            wordninja-windows-64-lua*
            wordninja-linux-lua*
