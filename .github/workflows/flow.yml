on: 
  workflow_dispatch: 

name: Continuous integration

permissions:
  contents: write

jobs:
  # ==========================================
  # 1. Linux 构建 (已全绿，保持解耦逻辑)
  # ==========================================
  build-latest-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]
        lua: [lua53, lua54, lua55]
    steps:
      - uses: actions/checkout@v4
      - uses: hecrj/setup-rust-action@v2
        with:
          rust-version: ${{ matrix.rust }}
      - name: Fetch Lua Source
        run: |
          LUA_DL_VER="${{ matrix.lua == 'lua55' && '5.5.0' || (matrix.lua == 'lua54' && '5.4.6' || '5.3.6') }}"
          curl -L https://www.lua.org/ftp/lua-${LUA_DL_VER}.tar.gz | tar xz
          echo "LUA_INCLUDE_DIR=$(pwd)/lua-${LUA_DL_VER}/src" >> $GITHUB_ENV
      - name: Build Module Only
        run: cargo build --release --features "${{ matrix.lua }}"
        env:
          LUA_INCLUDE_DIR: ${{ env.LUA_INCLUDE_DIR }}
      - name: Rename
        run: mv target/release/libwordninja_rs_lua.so wordninja_linux_${{ matrix.lua }}.so
      - uses: actions/upload-artifact@v4
        with:
          name: wordninja-linux-${{ matrix.lua }}
          path: wordninja_linux_${{ matrix.lua }}.so

  # ==========================================
  # 2. Windows 构建 (32/64位 统一逻辑)
  # ==========================================
  build-latest-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [i686, x86_64]
        lua: [lua53, lua54, lua55]
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - uses: actions/checkout@v4
      - uses: hecrj/setup-rust-action@v2
        with:
          rust-version: stable
          targets: ${{ matrix.arch == 'i686' && 'i686-pc-windows-gnu' || 'x86_64-pc-windows-gnu' }}
      
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.arch == 'i686' && 'MINGW32' || 'MINGW64' }}
          path-type: inherit
          install: >-
            mingw-w64-${{ matrix.arch }}-gcc
            make
            git

      - name: Independent Build Process
        shell: msys2 {0}
        run: |
          mkdir -p build_assets
          LUA_DL_VER="${{ matrix.lua == 'lua55' && '5.5.0' || (matrix.lua == 'lua54' && '5.4.6' || '5.3.6') }}"
          LUA_DIR="lua-${LUA_DL_VER}"
          curl -L https://www.lua.org/ftp/lua-${LUA_DL_VER}.tar.gz | tar xz
          
          # --- A: 独立编译 Lua DLL ---
          echo "Building Lua Core DLL independently..."
          cd ${LUA_DIR}
          make mingw
          # 提取 DLL 并重命名以区分位宽
          SUFFIX="${{ matrix.arch == 'i686' && 'win32' || 'win64' }}"
          cp src/${{ matrix.lua }}.dll ../build_assets/${{ matrix.lua }}_${SUFFIX}.dll
          cd ..
          
          # --- B: 编译 Rust 插件 (Module 模式) ---
          echo "Building Wordninja Plugin..."
          # 强制使用刚才下载的源码头文件，但不链接刚才生成的 DLL
          export LUA_INCLUDE_DIR="$(pwd)/${LUA_DIR}/src"
          TARGET_FLAG="${{ matrix.arch == 'i686' && '--target i686-pc-windows-gnu' || '' }}"
          cargo build --release --features "${{ matrix.lua }}" ${TARGET_FLAG}
          
          # 提取插件
          OUT_DIR="${{ matrix.arch == 'i686' && 'target/i686-pc-windows-gnu/release' || 'target/release' }}"
          BIT_VER="${{ matrix.arch == 'i686' && '32' || '64' }}"
          cp ${OUT_DIR}/wordninja_rs_lua.dll build_assets/wordninja_windows_${BIT_VER}_${{ matrix.lua }}.dll

      - uses: actions/upload-artifact@v4
        with:
          name: wordninja-${{ matrix.arch }}-${{ matrix.lua }}
          path: build_assets/*

  # ==========================================
  # 3. 发布任务 (汇总所有独立零件)
  # ==========================================
  release-latest:
    needs: [build-latest-linux, build-latest-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Automatic Release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          title: "Wordninja RS Final - Independent Core & Module"
          files: |
            wordninja-*/*.so
            wordninja-*/*.dll
