on: 
  push:
  pull_request:
  workflow_dispatch: 

name: Continuous integration

jobs:
  # ==========================================
  # 1. Linux 构建任务 (支持 Lua 5.3, 5.4, 5.5)
  # ==========================================
  build-latest-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]
        lua: [lua53, lua54, lua55]
    steps:
      - uses: actions/checkout@v4
      - uses: hecrj/setup-rust-action@v2
        with:
          rust-version: ${{ matrix.rust }}

      - name: Setup Lua Environment
        run: |
          sudo apt-get update
          if [[ "${{ matrix.lua }}" == "lua55" ]]; then
            curl -L https://www.lua.org/ftp/lua-5.5.0.tar.gz | tar xz
            cd lua-5.5.0
            make linux MYCFLAGS="-fPIC"
            sudo make install
            echo "LUA_LIB_DIR=/usr/local/lib" >> $GITHUB_ENV
            echo "LUA_INCLUDE_DIR=/usr/local/include" >> $GITHUB_ENV
            sudo ldconfig /usr/local/lib
          else
            LUA_VER="${{ matrix.lua == 'lua53' && '5.3' || '5.4' }}"
            sudo apt-get install -y --no-install-recommends liblua${LUA_VER}-dev
          fi

      - name: Build Linux
        run: cargo build --release --features "${{ matrix.lua }}"
        env:
          LUA_LIB_DIR: ${{ env.LUA_LIB_DIR }}
          LUA_INCLUDE_DIR: ${{ env.LUA_INCLUDE_DIR }}

      - name: Rename and Upload
        run: mv target/release/libwordninja_rs_lua.so wordninja_linux_${{ matrix.lua }}.so
      - uses: actions/upload-artifact@v4
        with:
          name: wordninja-linux-${{ matrix.lua }}
          path: wordninja_linux_${{ matrix.lua }}.so

  # ==========================================
  # 2. Windows 32位 构建任务 (修正 Git 与 SSL, 增加目录创建)
  # ==========================================
  build-latest-win32:
    runs-on: windows-latest
    strategy:
      matrix:
        rust: [stable]
        lua: [lua53, lua54, lua55]
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - uses: actions/checkout@v4
      - uses: hecrj/setup-rust-action@v2
        with:
          rust-version: ${{ matrix.rust }}
          targets: i686-pc-windows-gnu
      
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          path-type: inherit
          install: >-
            git 
            make
            mingw-w64-i686-gcc
            mingw-w64-i686-pkg-config
            mingw-w64-i686-lua
            mingw-w64-i686-lua53

      - name: Build Lua 5.5 for Win32
        shell: msys2 {0}
        run: |
          if [[ "${{ matrix.lua }}" == "lua55" ]]; then
            curl -L https://www.lua.org/ftp/lua-5.5.0.tar.gz | tar xz
            cd lua-5.5.0
            make mingw
            # 💡 关键修正：确保目录存在
            mkdir -p /usr/local/bin /usr/local/lib /usr/local/include
            cp src/lua55.dll /usr/local/bin/
            cp src/liblua.a /usr/local/lib/
            cp src/*.h /usr/local/include/
            echo "LUA_LIB_DIR=/usr/local/lib" >> $GITHUB_ENV
            echo "LUA_INCLUDE_DIR=/usr/local/include" >> $GITHUB_ENV
          fi

      - name: Build Win32
        shell: msys2 {0}
        run: cargo build --release --features "${{ matrix.lua }}" --target i686-pc-windows-gnu

      - name: Rename and Upload
        shell: bash
        run: mv target/i686-pc-windows-gnu/release/wordninja_rs_lua.dll wordninja_windows_32_${{ matrix.lua }}.dll
      - uses: actions/upload-artifact@v4
        with:
          name: wordninja-windows-32-${{ matrix.lua }}
          path: wordninja_windows_32_${{ matrix.lua }}.dll

  # ==========================================
  # 3. Windows 64位 构建任务 (修正 Git 与 SSL, 增加目录创建)
  # ==========================================
  build-latest-win64:
    runs-on: windows-latest
    strategy:
      matrix:
        rust: [stable]
        lua: [lua53, lua54, lua55]
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - uses: actions/checkout@v4
      - uses: hecrj/setup-rust-action@v2
        with:
          rust-version: ${{ matrix.rust }}
      
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-lua
            mingw-w64-x86_64-lua53

      - name: Build Lua 5.5 for Win64
        shell: msys2 {0}
        run: |
          if [[ "${{ matrix.lua }}" == "lua55" ]]; then
            curl -L https://www.lua.org/ftp/lua-5.5.0.tar.gz | tar xz
            cd lua-5.5.0
            make mingw
            # 💡 关键修正：确保目录存在
            mkdir -p /usr/local/bin /usr/local/lib /usr/local/include
            cp src/lua55.dll /usr/local/bin/
            cp src/liblua.a /usr/local/lib/
            cp src/*.h /usr/local/include/
            echo "LUA_LIB_DIR=/usr/local/lib" >> $GITHUB_ENV
            echo "LUA_INCLUDE_DIR=/usr/local/include" >> $GITHUB_ENV
          fi

      - name: Build Win64
        shell: msys2 {0}
        run: cargo build --release --features "${{ matrix.lua }}"

      - name: Rename and Upload
        shell: bash
        run: mv target/release/wordninja_rs_lua.dll wordninja_windows_64_${{ matrix.lua }}.dll
      - uses: actions/upload-artifact@v4
        with:
          name: wordninja-windows-64-${{ matrix.lua }}
          path: wordninja_windows_64_${{ matrix.lua }}.dll

  # ==========================================
  # 4. 自动发布任务
  # ==========================================
  release-latest:
    needs: [build-latest-linux, build-latest-win32, build-latest-win64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          files: |
            wordninja-linux-*/wordninja_linux_lua*.so
            wordninja-windows-32-*/wordninja_windows_32_lua*.dll
            wordninja-windows-64-*/wordninja_windows_64_lua*.dll
